<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The UK's first dedicated reviews platform for Black hair and beauty. Coming soon." />
  <title>Teaspill — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2C1810;
      --dark: #1a0c06;
      --rose: #DBA99A;
      --champagne: #DED0C4;
      --cream: #FDF8F5;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--dark);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      position: relative;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px),
        repeating-linear-gradient(-45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px);
      pointer-events: none;
      z-index: 0;
    }

    /* Warm colour wash */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(44,24,16,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(222,208,196,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Oversized faded watermark */
    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(80px, 20vw, 200px);
      font-weight: 500;
      color: var(--champagne);
      opacity: 0.032;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      letter-spacing: -2px;
      user-select: none;
    }

    /* Champagne glow */
    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50vmin;
      height: 50vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(222,208,196,0.13) 0%, rgba(219,169,154,0.05) 45%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* Page wrapper */
    .page {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      height: 100vh;
      justify-content: center;
      gap: 0;
    }

    .eyebrow {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .logo {
      font-family: var(--font-heading);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(36px, 8vw, 48px);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo .tea { color: #DED0C4; }
    .logo .spill { color: var(--rose); }

    .tagline {
      font-size: 9.5px;
      color: var(--champagne);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0.35;
      margin-bottom: 0;
    }

    /* Cup - negative margins eat into the PNG's built-in whitespace */
    .cup-wrap {
      margin: -16px auto;
    }

    .cup-wrap img {
      width: clamp(220px, 42vmin, 300px);
      height: clamp(220px, 42vmin, 300px);
      object-fit: contain;
      display: block;
    }

    .divider-line {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, transparent, rgba(219,169,154,0.45), transparent);
      margin: 4px auto 12px;
    }

    .body-text {
      font-size: 12.5px;
      color: var(--champagne);
      line-height: 1.75;
      max-width: 240px;
      opacity: 0.8;
      font-weight: 300;
      margin-bottom: 6px;
    }

    .body-text-italic {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 15px;
      color: #FDF8F5;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .form {
      width: 100%;
      max-width: 320px;
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .form input {
      flex: 1;
      background: rgba(253,248,245,0.07);
      border: 1px solid rgba(253,248,245,0.16);
      border-radius: 4px;
      padding: 11px 13px;
      font-size: 12.5px;
      color: var(--cream);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }

    .form input::placeholder { color: rgba(253,248,245,0.32); }
    .form input:focus { border-color: rgba(219,169,154,0.5); }

    .form button {
      background: var(--rose);
      border: none;
      border-radius: 4px;
      padding: 11px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      font-family: var(--font-body);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .form button:hover { background: #c99585; }

    .success-msg {
      display: none;
      font-size: 12px;
      color: var(--rose);
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .contact-line {
      font-size: 10.5px;
      color: rgba(222,208,196,0.4);
      letter-spacing: 0.8px;
    }

    .contact-line a {
      color: inherit;
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-line a:hover { color: rgba(222,208,196,0.65); }

    /* Tablet */
    @media (min-width: 640px) {
      .page { max-width: 560px; padding: 40px 48px; }
      .logo { font-size: clamp(40px, 7vw, 52px); margin-bottom: 10px; }
      .eyebrow { margin-bottom: 12px; }
      .cup-wrap img { width: clamp(240px, 38vmin, 320px); height: clamp(240px, 38vmin, 320px); }
      .cup-wrap { margin: -18px auto; }
      .form { max-width: 380px; }
      .body-text { max-width: 280px; font-size: 13px; }
      .body-text-italic { font-size: 16px; }
    }

    /* Desktop */
    @media (min-width: 1024px) {
      .page { max-width: 620px; padding: 40px 60px; }
      .watermark { font-size: clamp(140px, 16vw, 220px); }
      .logo { font-size: clamp(44px, 5vw, 54px); margin-bottom: 10px; }
      .tagline { font-size: 10px; letter-spacing: 3px; }
      .cup-wrap img { width: clamp(260px, 30vmin, 340px); height: clamp(260px, 30vmin, 340px); }
      .cup-wrap { margin: -20px auto; }
      .divider-line { height: 32px; margin-bottom: 14px; }
      .form { max-width: 420px; }
      .form input { padding: 13px 15px; font-size: 13px; }
      .form button { padding: 13px 20px; font-size: 12px; }
      .body-text { max-width: 300px; font-size: 13.5px; }
      .body-text-italic { font-size: 17px; margin-bottom: 22px; }
      .contact-line { font-size: 11px; }
    }
  </style>
</head>
<body>

  <div class="watermark">Teaspill</div>
  <div class="glow"></div>

  <div class="page">
    <div class="content" style="display:flex;flex-direction:column;align-items:center;width:100%;">

      <p class="eyebrow">Coming soon</p>

      <div class="logo">
        <span class="tea">Tea</span><span class="spill">spill</span>
      </div>

      <p class="tagline">Black beauty, honestly reviewed</p>

      <div class="cup-wrap">
        <img src="cup.png" alt="Teaspill tea cup" />
      </div>

      <div class="divider-line"></div>

      <p class="body-text">The UK's first dedicated reviews platform for Black hair &amp; beauty.</p>

      <p class="body-text-italic">No more bad chair days.</p>

      <form class="form" id="emailForm" onsubmit="handleSubmit(event)">
        <input type="email" id="emailInput" placeholder="Your email address" required />
        <button type="submit">Notify me</button>
      </form>

      <p class="success-msg" id="successMsg">You're on the list — we'll be in touch ✦</p>

      <p class="contact-line">
        <a href="https://instagram.com/teaspill_uk" target="_blank">@teaspill_uk</a>
        &nbsp;·&nbsp;
        <a href="mailto:hello@teaspill.co.uk">hello@teaspill.co.uk</a>
      </p>

    </div>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('emailForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
