<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The UK's first dedicated reviews platform for Black hair and beauty. Coming soon." />
  <title>Teaspill — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2C1810;
      --dark: #1a0c06;
      --rose: #DBA99A;
      --champagne: #DED0C4;
      --cream: #FDF8F5;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    html, body { width: 100%; min-height: 100vh; }

    body {
      font-family: var(--font-body);
      background-color: var(--dark);
      color: var(--cream);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px),
        repeating-linear-gradient(-45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px);
      pointer-events: none; z-index: 0;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(44,24,16,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(222,208,196,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    @keyframes ripple1 {
      0%   { transform: translateX(-120%) skewX(-8deg); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateX(220%) skewX(-8deg); opacity: 0; }
    }

    .ripple-layer {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1; overflow: hidden;
    }

    .ripple-layer span {
      position: absolute; top: 0; left: 0;
      width: 40%; height: 100%;
      background: linear-gradient(90deg,
        transparent 0%, rgba(222,208,196,0.03) 30%,
        rgba(219,169,154,0.055) 50%, rgba(222,208,196,0.03) 70%, transparent 100%
      );
    }

    .ripple-layer span:nth-child(1) { animation: ripple1 14s ease-in-out infinite; }
    .ripple-layer span:nth-child(2) { animation: ripple1 14s ease-in-out infinite; animation-delay: 7s; }

    .watermark {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-heading); font-style: italic;
      font-size: clamp(100px, 22vw, 240px); font-weight: 500;
      color: var(--champagne); opacity: 0.032;
      white-space: nowrap; pointer-events: none; z-index: 0;
      letter-spacing: -2px; user-select: none;
    }

    .glow {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 55vmin; height: 55vmin; border-radius: 50%;
      background: radial-gradient(circle, rgba(222,208,196,0.12) 0%, rgba(219,169,154,0.05) 45%, transparent 70%);
      pointer-events: none; z-index: 2;
    }

    /* Fixed footer — only on screens tall enough to not overlap content */
    .contact-line {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      z-index: 10; font-size: 11px;
      color: rgba(222,208,196,0.4);
      letter-spacing: 0.8px; white-space: nowrap;
    }

    .contact-line a { color: inherit; text-decoration: none; }
    .contact-line a:hover { color: rgba(222,208,196,0.65); }

    /* Page: 3-section flex column filling full viewport height */
    .page {
      position: relative; z-index: 3;
      width: 100%; max-width: 560px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; text-align: center;
      padding: 56px 28px 100px;
    }

    /* TOP: logo + tagline — stays fixed at top */
    .top-section {
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }

    .eyebrow {
      font-size: 9px; letter-spacing: 4px;
      text-transform: uppercase; color: var(--rose);
      font-weight: 500; margin-bottom: 12px;
    }

    .logo {
      font-family: var(--font-heading); font-style: italic;
      font-weight: 500; font-size: clamp(36px, 9vw, 52px);
      line-height: 1; margin-bottom: 12px; letter-spacing: -0.5px;
    }

    .logo .tea  { color: #DED0C4; }
    .logo .spill { color: var(--rose); }

    .tagline {
      font-size: 10px; color: var(--champagne);
      letter-spacing: 2.5px; text-transform: uppercase;
      font-weight: 300; opacity: 0.35;
    }

    /* MIDDLE: cup — grows to fill remaining space, cup centred within it */
    .cup-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 180px;
    }

    .cup-wrap {
      /* trim internal PNG whitespace equally top and bottom */
      margin: -6vmin 0;
    }

    .cup-wrap img {
      width: 55vmin;
      height: 55vmin;
      object-fit: contain;
      display: block;
    }

    /* BOTTOM: text + form — sits at the bottom naturally */
    .bottom-section {
      display: flex; flex-direction: column;
      align-items: center; width: 100%;
    }

    .body-text {
      font-size: 13px; color: var(--champagne);
      line-height: 1.8; max-width: 260px;
      opacity: 0.8; font-weight: 300; margin-bottom: 6px;
    }

    .body-text-italic {
      font-family: var(--font-heading); font-style: italic;
      font-size: 15px; color: var(--cream);
      opacity: 0.9; margin-bottom: 24px;
    }

    /* Form: full width stacked on mobile */
    .form {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .form input {
      width: 100%;
      background: rgba(253,248,245,0.07);
      border: 1px solid rgba(253,248,245,0.16);
      border-radius: 4px; padding: 13px 16px;
      font-size: 14px; color: var(--cream);
      font-family: var(--font-body); outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .form input::placeholder { color: rgba(253,248,245,0.32); }
    .form input:focus { border-color: rgba(219,169,154,0.5); }

    .form button {
      width: 100%;
      background: var(--rose); border: none;
      border-radius: 4px; padding: 13px 18px;
      font-size: 12px; font-weight: 600;
      color: var(--primary); font-family: var(--font-body);
      cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .form button:hover { background: #c99585; }

    .success-msg {
      display: none; font-size: 12px;
      color: var(--rose); letter-spacing: 0.5px; margin-top: 14px;
    }

    /* 540px+: form side by side */
    @media (min-width: 540px) {
      .form { flex-direction: row; max-width: 400px; }
      .form input { font-size: 13px; padding: 12px 14px; }
      .form button { width: auto; white-space: nowrap; }
    }

    @media (min-width: 640px) {
      .page { max-width: 600px; padding: 64px 48px 100px; }
      .logo { font-size: clamp(42px, 6vw, 54px); }
      .cup-wrap img { width: 50vmin; height: 50vmin; }
      .cup-wrap { margin: -5vmin 0; }
      .form { max-width: 420px; }
      .body-text { max-width: 290px; font-size: 13.5px; }
      .body-text-italic { font-size: 16px; }
      .contact-line { font-size: 12px; bottom: 28px; }
    }

    @media (min-width: 1024px) {
      .page { max-width: 660px; padding: 72px 60px 100px; }
      .logo { font-size: clamp(44px, 4.5vw, 56px); }
      .cup-wrap img { width: 44vmin; height: 44vmin; }
      .cup-wrap { margin: -4vmin 0; }
      .form { max-width: 440px; }
      .form input { padding: 13px 16px; font-size: 13.5px; }
      .form button { padding: 13px 22px; font-size: 12px; }
      .body-text { max-width: 300px; font-size: 14px; }
      .body-text-italic { font-size: 17px; margin-bottom: 28px; }
      .contact-line { font-size: 12px; bottom: 28px; }
    }
  </style>
</head>
<body>

  <div class="watermark">Teaspill</div>
  <div class="ripple-layer"><span></span><span></span></div>
  <div class="glow"></div>

  <p class="contact-line">
    <a href="https://instagram.com/teaspill_uk" target="_blank">@teaspill_uk</a>
    &nbsp;·&nbsp;
    <a href="mailto:hello@teaspill.co.uk">hello@teaspill.co.uk</a>
    &nbsp;·&nbsp;
    © 2026
  </p>

  <div class="page">

    <!-- TOP: stays at top -->
    <div class="top-section">
      <p class="eyebrow">Coming soon</p>
      <div class="logo">
        <span class="tea">Tea</span><span class="spill">spill</span>
      </div>
      <p class="tagline">Black beauty, honestly reviewed</p>
    </div>

    <!-- MIDDLE: cup centred in remaining space -->
    <div class="cup-section">
      <div class="cup-wrap">
        <img src="cup.png" alt="Teaspill tea cup" />
      </div>
    </div>

    <!-- BOTTOM: text and form pushed to bottom -->
    <div class="bottom-section">
      <p class="body-text">The UK's first dedicated reviews platform for Black hair &amp; beauty.</p>
      <p class="body-text-italic">No more bad chair days.</p>

      <form class="form" id="emailForm" onsubmit="handleSubmit(event)">
        <input type="email" id="emailInput" placeholder="Your email address" required />
        <button type="submit">Notify me</button>
      </form>
      <p class="success-msg" id="successMsg">You're on the list — we'll be in touch ✦</p>
    </div>

  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('emailForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
