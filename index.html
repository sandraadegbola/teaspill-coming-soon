<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The UK's first dedicated reviews platform for Black hair and beauty. Coming soon." />
  <title>Teaspill — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2C1810;
      --dark: #1a0c06;
      --rose: #DBA99A;
      --champagne: #DED0C4;
      --cream: #FDF8F5;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    html, body {
      min-height: 100%;
      width: 100%;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--dark);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px),
        repeating-linear-gradient(-45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(44,24,16,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(222,208,196,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 60px 32px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      min-height: 100vh;
      justify-content: center;
    }

    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(80px, 22vw, 160px);
      font-weight: 500;
      color: var(--champagne);
      opacity: 0.035;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      letter-spacing: -2px;
      user-select: none;
    }

    .glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(222,208,196,0.14) 0%, rgba(219,169,154,0.06) 40%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .eyebrow {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      margin-bottom: 14px;
    }

    .logo {
      font-family: var(--font-heading);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(38px, 10vw, 52px);
      line-height: 1;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .logo .tea { color: #DED0C4; }
    .logo .spill { color: var(--rose); }

    .tagline {
      font-size: 10px;
      color: var(--champagne);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0.35;
      margin-bottom: 40px;
    }

    .cup-wrap {
      margin-bottom: 24px;
    }

    .cup-wrap img {
      width: clamp(200px, 55vw, 280px);
      height: clamp(200px, 55vw, 280px);
      object-fit: contain;
      display: block;
    }

    .divider-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, transparent, rgba(219,169,154,0.5), transparent);
      margin: 0 auto 28px;
    }

    .body-text {
      font-size: 13px;
      color: var(--champagne);
      line-height: 1.8;
      max-width: 260px;
      opacity: 0.82;
      font-weight: 300;
      margin-bottom: 16px;
    }

    .body-text-italic {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 15px;
      color: #FDF8F5;
      opacity: 0.9;
      margin-bottom: 32px;
    }

    .form {
      width: 100%;
      max-width: 340px;
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .form input {
      flex: 1;
      background: rgba(253,248,245,0.07);
      border: 1px solid rgba(253,248,245,0.16);
      border-radius: 4px;
      padding: 13px 14px;
      font-size: 13px;
      color: var(--cream);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }

    .form input::placeholder { color: rgba(253,248,245,0.35); }
    .form input:focus { border-color: rgba(219,169,154,0.5); }

    .form button {
      background: var(--rose);
      border: none;
      border-radius: 4px;
      padding: 13px 18px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--primary);
      font-family: var(--font-body);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .form button:hover { background: #c99585; }

    .success-msg {
      display: none;
      font-size: 12.5px;
      color: var(--rose);
      letter-spacing: 0.5px;
      margin-bottom: 28px;
    }

    .contact-line {
      font-size: 11px;
      color: rgba(222,208,196,0.45);
      letter-spacing: 0.8px;
    }

    .contact-line a {
      color: inherit;
      text-decoration: none;
    }

    .contact-line a:hover { color: rgba(222,208,196,0.7); }

    /* Tablet */
    @media (min-width: 640px) {
      .page {
        padding: 80px 60px 64px;
        max-width: 560px;
      }
      .logo {
        font-size: clamp(48px, 8vw, 64px);
        margin-bottom: 14px;
      }
      .eyebrow { margin-bottom: 16px; }
      .tagline { margin-bottom: 44px; font-size: 11px; }
      .cup-wrap img { width: 300px; height: 300px; }
      .cup-wrap { margin-bottom: 28px; }
      .glow { width: 460px; height: 460px; }
      .form { max-width: 420px; }
      .form input { font-size: 14px; padding: 14px 16px; }
      .form button { font-size: 12.5px; padding: 14px 22px; }
      .body-text { max-width: 340px; font-size: 14px; }
      .body-text-italic { font-size: 17px; }
      .contact-line { font-size: 12px; }
    }

    /* Desktop */
    @media (min-width: 1024px) {
      body { align-items: center; }
      .page {
        max-width: 680px;
        padding: 0 80px;
        min-height: 100vh;
        justify-content: center;
      }
      .watermark { font-size: clamp(160px, 18vw, 220px); opacity: 0.03; }
      .logo { font-size: clamp(56px, 6vw, 72px); margin-bottom: 16px; }
      .tagline { font-size: 11px; letter-spacing: 3px; margin-bottom: 48px; }
      .cup-wrap img { width: 340px; height: 340px; }
      .glow { width: 540px; height: 540px; }
      .form { max-width: 460px; }
      .form input { font-size: 14px; padding: 15px 18px; }
      .form button { font-size: 13px; padding: 15px 26px; }
      .body-text { max-width: 380px; font-size: 15px; }
      .body-text-italic { font-size: 19px; margin-bottom: 36px; }
      .divider-line { height: 44px; margin-bottom: 32px; }
      .contact-line { font-size: 12.5px; }
    }
  </style>
</head>
<body>

  <div class="watermark">Teaspill</div>

  <div class="page">
    <div class="glow"></div>

    <div class="content">
      <p class="eyebrow">Coming soon</p>

      <div class="logo">
        <span class="tea">Tea</span><span class="spill">spill</span>
      </div>

      <p class="tagline">Black beauty, honestly reviewed</p>

      <div class="cup-wrap">
        <img src="cup.png" alt="Teaspill tea cup" />
      </div>

      <div class="divider-line"></div>

      <p class="body-text">The UK's first dedicated reviews platform for Black hair &amp; beauty.</p>

      <p class="body-text-italic">No more bad chair days.</p>

      <form class="form" id="emailForm" onsubmit="handleSubmit(event)">
        <input type="email" id="emailInput" placeholder="Your email address" required />
        <button type="submit">Notify me</button>
      </form>

      <p class="success-msg" id="successMsg">You're on the list — we'll be in touch ✦</p>

      <p class="contact-line">
        <a href="https://instagram.com/teaspill_uk" target="_blank">@teaspill_uk</a>
        &nbsp;·&nbsp;
        <a href="mailto:hello@teaspill.co.uk">hello@teaspill.co.uk</a>
      </p>
    </div>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;
      console.log('Email submitted:', email);
      document.getElementById('emailForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
