<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teaspill — Coming Soon</title>
  <meta name="description" content="The UK's first dedicated reviews platform for Black hair and beauty. Coming soon." />
  <meta property="og:title" content="Teaspill — Coming Soon" />
  <meta property="og:description" content="The UK's first dedicated reviews platform for Black hair and beauty." />
  <meta property="og:url" content="https://teaspill.co.uk" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@1,500&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #2C1810;
      color: #FDF8F5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Logo */
    .logo {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: 26px;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .logo .dark { color: #DED0C4; }
    .logo .rose  { color: #DBA99A; }

    .tagline-small {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: #5A4540;
      margin-bottom: 40px;
    }

    /* Tea cup SVG */
    .cup-wrap {
      margin-bottom: 36px;
    }

    /* Headline */
    h1 {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(32px, 8vw, 48px);
      color: #FDF8F5;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }

    .sub {
      font-size: 13px;
      font-weight: 300;
      color: #9B877D;
      text-align: center;
      line-height: 1.75;
      max-width: 320px;
      margin-bottom: 40px;
    }
    .sub strong {
      font-weight: 400;
      color: #DED0C4;
    }

    /* Form */
    form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 48px;
    }

    input[type="email"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(219,169,154,0.2);
      border-radius: 6px;
      padding: 14px 16px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      color: #FDF8F5;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="email"]::placeholder { color: #4A3530; }
    input[type="email"]:focus { border-color: rgba(219,169,154,0.5); }

    button[type="submit"] {
      width: 100%;
      background: #DBA99A;
      border: none;
      border-radius: 6px;
      padding: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #2C1810;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    button[type="submit"]:hover { opacity: 0.9; }
    button[type="submit"]:active { opacity: 0.8; }

    .success-msg {
      display: none;
      font-size: 13px;
      color: #DBA99A;
      text-align: center;
      padding: 12px;
      border: 1px solid rgba(219,169,154,0.2);
      border-radius: 6px;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(222,208,196,0.15);
      margin-bottom: 28px;
    }

    /* Footer links */
    footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .footer-link {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #7A6058;
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: 0.2px;
    }
    .footer-link:hover { color: #DED0C4; }
    .footer-link svg { flex-shrink: 0; }

    .copyright {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #3A2820;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">

    <p class="logo"><span class="dark">Tea</span><span class="rose">spill</span></p>
    <p class="tagline-small">Black beauty &middot; Honestly reviewed</p>

    <!-- Tea cup illustration -->
    <div class="cup-wrap">
      <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Steam -->
        <path d="M36 40 L37.5 28 Q38 23 42 23" stroke="#DBA99A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M50 40 L50 27 Q50 22 54 22" stroke="#DBA99A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M64 40 L62 28 Q61.5 23 58 23" stroke="#DBA99A" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.7"/>
        <!-- Rim -->
        <line x1="22" y1="40" x2="78" y2="40" stroke="#DBA99A" stroke-width="1.3"/>
        <!-- Cup body -->
        <path d="M24 40 L26 68 Q26.5 75 33 75 L67 75 Q73.5 75 74 68 L76 40 Z" stroke="#DED0C4" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
        <!-- Handle -->
        <path d="M76 48 Q90 48 90 58 Q90 68 76 68" stroke="#DED0C4" stroke-width="1.5" fill="none"/>
        <!-- Saucer -->
        <path d="M28 75 L23 80 L77 80 L72 75" stroke="#DED0C4" stroke-width="1.3" fill="none" stroke-linejoin="round"/>
        <!-- Liquid surface -->
        <ellipse cx="50" cy="62" rx="8" ry="2.5" stroke="#DBA99A" stroke-width="1" fill="none" opacity="0.5"/>
      </svg>
    </div>

    <h1>No more bad<br>chair days.</h1>

    <p class="sub">
      <strong>The UK's first dedicated reviews platform for Black hair and beauty.</strong>
      Coming soon — be the first to know.
    </p>

    <form id="notify-form">
      <input type="email" id="email-input" placeholder="Your email address" required autocomplete="email" />
      <button type="submit">Notify me when we launch</button>
      <p class="success-msg" id="success-msg">You're on the list! We'll be in touch soon.</p>
    </form>

    <div class="divider"></div>

    <footer>
      <a class="footer-link" href="https://instagram.com/teaspill_uk" target="_blank" rel="noopener">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </svg>
        @teaspill_uk
      </a>
      <a class="footer-link" href="mailto:hello@teaspill.co.uk">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        hello@teaspill.co.uk
      </a>
      <p class="copyright">&copy; 2026 Teaspill</p>
    </footer>

  </div>

  <script>
    document.getElementById('notify-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var email = document.getElementById('email-input').value;
      var btn = this.querySelector('button');
      var msg = document.getElementById('success-msg');

      btn.textContent = 'Done!';
      btn.style.opacity = '0.6';
      btn.disabled = true;
      document.getElementById('email-input').style.display = 'none';
      msg.style.display = 'block';

      // Replace this with your email capture endpoint (e.g. Mailchimp, ConvertKit, Airtable)
      // fetch('/api/subscribe', { method: 'POST', body: JSON.stringify({ email }) })
      console.log('Email captured:', email);
    });
  </script>
</body>
</html>
