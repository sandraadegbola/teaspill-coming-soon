<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The UK's first dedicated reviews platform for Black hair and beauty. Coming soon." />
  <title>Teaspill — Coming Soon</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2C1810;
      --dark: #1a0c06;
      --rose: #DBA99A;
      --champagne: #DED0C4;
      --cream: #FDF8F5;
      --font-heading: 'Lora', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }

    html, body { height: 100%; width: 100%; }

    body {
      font-family: var(--font-body);
      background-color: var(--dark);
      color: var(--cream);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px),
        repeating-linear-gradient(-45deg, rgba(219,169,154,0.012) 0px, rgba(219,169,154,0.012) 1px, transparent 1px, transparent 9px);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 20%, rgba(44,24,16,0.5) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 75%, rgba(222,208,196,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Horizontal ripple waves */
    @keyframes ripple1 {
      0%   { transform: translateX(-120%) skewX(-8deg); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateX(220%) skewX(-8deg); opacity: 0; }
    }
    @keyframes ripple2 {
      0%   { transform: translateX(-120%) skewX(-8deg); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateX(220%) skewX(-8deg); opacity: 0; }
    }

    .ripple-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .ripple-layer span {
      position: absolute;
      top: 0;
      left: 0;
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(222,208,196,0.03) 30%,
        rgba(219,169,154,0.055) 50%,
        rgba(222,208,196,0.03) 70%,
        transparent 100%
      );
    }

    .ripple-layer span:nth-child(1) {
      animation: ripple1 14s ease-in-out infinite;
      animation-delay: 0s;
    }
    .ripple-layer span:nth-child(2) {
      animation: ripple2 14s ease-in-out infinite;
      animation-delay: 7s;
    }

    .watermark {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(100px, 22vw, 240px);
      font-weight: 500;
      color: var(--champagne);
      opacity: 0.032;
      white-space: nowrap;
      pointer-events: none;
      z-index: 0;
      letter-spacing: -2px;
      user-select: none;
    }

    .glow {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60vmin;
      height: 60vmin;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(222,208,196,0.12) 0%, rgba(219,169,154,0.05) 45%, transparent 70%);
      pointer-events: none;
      z-index: 2;
    }

    .contact-line {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 11px;
      color: rgba(222,208,196,0.4);
      letter-spacing: 0.8px;
      white-space: nowrap;
    }

    .contact-line a { color: inherit; text-decoration: none; }
    .contact-line a:hover { color: rgba(222,208,196,0.65); }

    .page {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 52px 32px 80px;
    }

    .eyebrow {
      font-size: 9px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--rose);
      font-weight: 500;
      margin-bottom: 10px;
    }

    .logo {
      font-family: var(--font-heading);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(38px, 8vw, 52px);
      line-height: 1;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .logo .tea { color: #DED0C4; }
    .logo .spill { color: var(--rose); }

    .tagline {
      font-size: 10px;
      color: var(--champagne);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-weight: 300;
      opacity: 0.35;
      margin-bottom: 0;
    }

    .cup-wrap img {
      width: 60vmin;
      height: 60vmin;
      object-fit: contain;
      display: block;
      margin: -5vmin auto -15vmin;
    }

    .body-text {
      font-size: 13px;
      color: var(--champagne);
      line-height: 1.8;
      max-width: 260px;
      opacity: 0.8;
      font-weight: 300;
      margin-bottom: 6px;
    }

    .body-text-italic {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: 15px;
      color: #FDF8F5;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .form {
      width: 100%;
      max-width: 320px;
      display: flex;
      gap: 8px;
    }

    .form input {
      flex: 1;
      background: rgba(253,248,245,0.07);
      border: 1px solid rgba(253,248,245,0.16);
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--cream);
      font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }

    .form input::placeholder { color: rgba(253,248,245,0.32); }
    .form input:focus { border-color: rgba(219,169,154,0.5); }

    .form button {
      background: var(--rose);
      border: none;
      border-radius: 4px;
      padding: 12px 18px;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--primary);
      font-family: var(--font-body);
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }

    .form button:hover { background: #c99585; }

    .success-msg {
      display: none;
      font-size: 12px;
      color: var(--rose);
      letter-spacing: 0.5px;
      margin-top: 14px;
    }

    @media (max-width: 500px) {
      .page { padding: 44px 24px 72px; }
      .contact-line { font-size: 10px; bottom: 16px; }
    }

    @media (min-width: 640px) {
      .page { max-width: 580px; padding: 52px 48px 80px; }
      .logo { font-size: clamp(42px, 7vw, 54px); }
      .form { max-width: 380px; }
      .body-text { max-width: 290px; font-size: 13.5px; }
      .body-text-italic { font-size: 16px; }
      .contact-line { font-size: 12px; bottom: 28px; }
    }

    @media (min-width: 1024px) {
      .page { max-width: 640px; padding: 52px 60px 80px; }
      .logo { font-size: clamp(44px, 5vw, 56px); }
      .form { max-width: 420px; }
      .form input { padding: 13px 16px; font-size: 13.5px; }
      .form button { padding: 13px 20px; font-size: 12px; }
      .body-text { max-width: 300px; font-size: 14px; }
      .body-text-italic { font-size: 17px; margin-bottom: 22px; }
      .contact-line { font-size: 12px; bottom: 28px; }
    }
  </style>
</head>
<body>

  <div class="watermark">Teaspill</div>
  <div class="ripple-layer"><span></span><span></span></div>
  <div class="glow"></div>

  <p class="contact-line">
    <a href="https://instagram.com/teaspill_uk" target="_blank">@teaspill_uk</a>
    &nbsp;·&nbsp;
    <a href="mailto:hello@teaspill.co.uk">hello@teaspill.co.uk</a>
    &nbsp;·&nbsp;
    © 2026
  </p>

  <div class="page">
    <p class="eyebrow">Coming soon</p>
    <div class="logo">
      <span class="tea">Tea</span><span class="spill">spill</span>
    </div>
    <p class="tagline">Black beauty, honestly reviewed</p>

    <div class="cup-wrap">
      <img src="cup.png" alt="Teaspill tea cup" />
    </div>

    <p class="body-text">The UK's first dedicated reviews platform for Black hair &amp; beauty.</p>
    <p class="body-text-italic">No more bad chair days.</p>

    <form class="form" id="emailForm" onsubmit="handleSubmit(event)">
      <input type="email" id="emailInput" placeholder="Your email address" required />
      <button type="submit">Notify me</button>
    </form>
    <p class="success-msg" id="successMsg">You're on the list — we'll be in touch ✦</p>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      document.getElementById('emailForm').style.display = 'none';
      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
